name: Daily News Bot

on:
  schedule:
    - cron: '0 5 * * *'   # запуск в 7:00 Киев → придёт ~8:00
    - cron: '0 7 * * *'   # запуск в 9:00 Киев → придёт ~10:00
    - cron: '0 10 * * *'  # запуск в 12:00 Киев → придёт ~13:00
    - cron: '0 15 * * *'  # запуск в 17:00 Киев → придёт ~18:00
    - cron: '0 17 * * *'  # запуск в 19:00 Киев → придёт ~20:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests groq

      - name: Run news bot
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
        run: python news_bot.py

      - name: Keep repo active
        run: |
          git config user.email "bot@github.com"
          git config user.name "News Bot"
          echo "Last run: $(date)" > last_run.txt
          git add last_run.txt
          git commit -m "keep alive $(date +%Y-%m-%d-%H%M)" || echo "ok"
          git push

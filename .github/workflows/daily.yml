name: Daily News Bot

on:
  schedule:
    # 05:00 UTC = 08:00 по Москве (UTC+3)
    # Екатеринбург UTC+5 → пиши '0 3 * * *'
    # Новосибирск UTC+7 → пиши '0 1 * * *'
    # Владивосток UTC+10 → пиши '22 * * *' (предыдущего дня)
    - cron: '0 5 * * *'
  workflow_dispatch:  # кнопка ручного запуска для теста

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run news bot
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
        run: python news_bot.py
